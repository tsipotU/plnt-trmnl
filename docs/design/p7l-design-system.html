<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>p7l · design system</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* p7l design system — Scandinavian apothecary
   Light + dark from the start. All semantic tokens mapped to scales.
   Pristine: no grain, no texture, flat modern rendering. */

:root {
  /* === RAW SCALES (hand-tuned) === */

  /* Bone — paper whites & off-creams */
  --bone-50:  #fbfaf6;
  --bone-100: #f5f3ec;
  --bone-200: #ebe8de;
  --bone-300: #ddd9ca;
  --bone-400: #c8c2af;
  --bone-500: #a9a28a;

  /* Sage — muted garden green */
  --sage-50:  #f0f3ed;
  --sage-100: #dee5d4;
  --sage-200: #c4d0b3;
  --sage-300: #a3b58a;
  --sage-400: #7e9265;
  --sage-500: #5e7349;
  --sage-600: #475838;
  --sage-700: #36432b;
  --sage-800: #28321f;
  --sage-900: #1a2113;

  /* Slate — Scandinavian blue-grey */
  --slate-50:  #eef1f3;
  --slate-100: #d8dee2;
  --slate-200: #b8c2c9;
  --slate-300: #8e9da7;
  --slate-400: #6b7d88;
  --slate-500: #4f626d;
  --slate-600: #3c4c55;
  --slate-700: #2c383f;
  --slate-800: #1d262b;
  --slate-900: #11171b;

  /* Copper — oxidized accent (the surprising move) */
  --copper-50:  #f5ece5;
  --copper-100: #e6d2c0;
  --copper-200: #d2ac8a;
  --copper-300: #b88660;
  --copper-400: #9a6843;
  --copper-500: #7d5132;
  --copper-600: #5e3c25;
  --copper-700: #422a1a;

  /* Charcoal — for ink */
  --charcoal-50:  #ececea;
  --charcoal-100: #c8c8c4;
  --charcoal-200: #8d8d87;
  --charcoal-300: #555550;
  --charcoal-400: #2e2e2a;
  --charcoal-500: #1a1a17;
  --charcoal-600: #0e0e0c;

  /* Status (functional only — used sparingly, sit alongside palette) */
  --rust-400:   #b04a35;   /* needs-attention / overdue */
  --mustard-400:#c69a3b;   /* warning / dormant */

  /* === LIGHT MODE SEMANTIC TOKENS === */
  --bg:           var(--bone-50);
  --bg-elevated: #ffffff;
  --bg-sunken:    var(--bone-100);
  --bg-inverse:   var(--charcoal-500);

  --surface:      var(--bone-100);
  --surface-2:    var(--bone-200);
  --surface-hover:var(--bone-200);

  --border:       var(--bone-300);
  --border-strong:var(--charcoal-300);
  --rule:         var(--charcoal-400);    /* hairline horizontal rules */

  --ink:          var(--charcoal-500);    /* primary text */
  --ink-2:        var(--charcoal-300);    /* secondary text */
  --ink-3:        var(--charcoal-200);    /* tertiary / disabled */
  --ink-inverse:  var(--bone-50);

  --accent:       var(--sage-500);        /* primary brand action */
  --accent-hover: var(--sage-600);
  --accent-ink:   var(--bone-50);
  --accent-soft:  var(--sage-100);

  --link:         var(--slate-500);
  --link-hover:   var(--slate-700);

  --highlight:    var(--copper-400);      /* the rare ceremonial accent */
  --highlight-soft: var(--copper-50);

  --status-due:   var(--copper-400);
  --status-overdue:var(--rust-400);
  --status-dormant:var(--mustard-400);
  --status-healthy:var(--sage-500);

  /* === SPACING (4-step) === */
  --sp-1:  4px;
  --sp-2:  8px;
  --sp-3:  12px;
  --sp-4:  16px;
  --sp-5:  20px;
  --sp-6:  24px;
  --sp-8:  32px;
  --sp-10: 40px;
  --sp-12: 48px;
  --sp-16: 64px;
  --sp-20: 80px;

  /* === RADIUS — restrained, mid-century. Big radii feel wrong here. === */
  --r-0:   0;
  --r-1:   2px;
  --r-2:   4px;
  --r-3:   8px;
  --r-pill:9999px;

  /* === SHADOW — pristine, soft, never blurry-bloom === */
  --shadow-1: 0 1px 0 rgba(20,20,18,0.04), 0 1px 2px rgba(20,20,18,0.06);
  --shadow-2: 0 1px 0 rgba(20,20,18,0.05), 0 4px 10px rgba(20,20,18,0.06);
  --shadow-3: 0 2px 0 rgba(20,20,18,0.06), 0 12px 24px rgba(20,20,18,0.08);

  /* === TYPE === */
  --font-display: "Fraunces", "Source Serif 4", Georgia, serif;
  --font-serif:   "Source Serif 4", Georgia, serif;
  --font-sans:    "Inter Tight", system-ui, sans-serif;
  --font-mono:    "JetBrains Mono", ui-monospace, monospace;
}

[data-theme="dark"] {
  --bg:           #14171a;
  --bg-elevated:  #1c2024;
  --bg-sunken:    #0e1113;
  --bg-inverse:   var(--bone-100);

  --surface:      #1c2024;
  --surface-2:    #232830;
  --surface-hover:#262c34;

  --border:       #2c333a;
  --border-strong:#475058;
  --rule:         var(--bone-300);

  --ink:          var(--bone-100);
  --ink-2:        #aab1b8;
  --ink-3:        #6b737b;
  --ink-inverse:  var(--charcoal-500);

  --accent:       var(--sage-300);
  --accent-hover: var(--sage-200);
  --accent-ink:   var(--charcoal-500);
  --accent-soft:  rgba(126,146,101,0.15);

  --link:         var(--slate-200);
  --link-hover:   #d8dee2;

  --highlight:    var(--copper-300);
  --highlight-soft: rgba(184,134,96,0.12);

  --status-due:   var(--copper-300);
  --status-overdue:#d76952;
  --status-dormant:#d9b35d;
  --status-healthy:var(--sage-300);

  --shadow-1: 0 1px 0 rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.5);
  --shadow-2: 0 1px 0 rgba(0,0,0,0.5), 0 4px 10px rgba(0,0,0,0.5);
  --shadow-3: 0 2px 0 rgba(0,0,0,0.5), 0 12px 24px rgba(0,0,0,0.6);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* p7l design system — storybook chrome */

.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* === SIDEBAR === */
.sidebar {
  background: var(--bg-sunken);
  border-right: 1px solid var(--border);
  padding: var(--sp-6) 0 var(--sp-8);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-brand {
  padding: 0 var(--sp-6) var(--sp-6);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  border-bottom: 1px solid var(--border);
}
.sidebar-brand-mark {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
}
.sidebar-brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}
.sidebar-brand-name {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.sidebar-brand-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-top: 2px;
}

.sidebar-nav {
  flex: 1;
  padding: var(--sp-4) 0 var(--sp-4);
}
.sidebar-section {
  padding: var(--sp-4) var(--sp-6) var(--sp-2);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.sidebar-link {
  display: block;
  padding: 6px var(--sp-6);
  font-size: 14px;
  color: var(--ink-2);
  text-decoration: none;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.sidebar-link:hover {
  color: var(--ink);
  background: var(--surface);
}
.sidebar-link.active {
  color: var(--ink);
  background: var(--surface);
  border-left-color: var(--accent);
  font-weight: 500;
}

.sidebar-foot {
  padding: var(--sp-4) var(--sp-6);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-3);
}
.theme-toggle {
  appearance: none;
  border: 1px solid var(--border-strong);
  background: var(--bg-elevated);
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: var(--r-1);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.theme-toggle:hover { background: var(--surface); }

/* === MAIN === */
.main {
  padding: var(--sp-12) var(--sp-12) var(--sp-20);
  max-width: 1100px;
}

.page-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: var(--sp-3);
}
.page-title {
  font-family: var(--font-display);
  font-size: 56px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1;
  margin: 0 0 var(--sp-5);
  color: var(--ink);
}
.page-lede {
  font-family: var(--font-serif);
  font-size: 19px;
  line-height: 1.55;
  color: var(--ink-2);
  max-width: 680px;
  margin-bottom: var(--sp-12);
}

.section {
  margin-bottom: var(--sp-16);
}
.section-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin: 0 0 var(--sp-2);
  color: var(--ink);
}
.section-sub {
  font-size: 14px;
  color: var(--ink-2);
  margin-bottom: var(--sp-6);
  max-width: 640px;
}

.subhead {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin: var(--sp-8) 0 var(--sp-3);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
}
.subhead::before, .subhead::after {
  content: '';
  flex: 0 0 12px;
  height: 1px;
  background: var(--rule);
}
.subhead::after { flex: 1; }

/* === SPECIMEN BLOCK — the canonical "thing on display" === */
.specimen {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  padding: var(--sp-8);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 240px;
  position: relative;
}
.specimen-tag {
  position: absolute;
  top: var(--sp-3);
  left: var(--sp-3);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.specimen-grid {
  display: grid;
  gap: var(--sp-4);
}
.specimen-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.specimen-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.specimen-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.specimen-grid.cols-6 { grid-template-columns: repeat(6, 1fr); }

/* token rows */
.token-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.token-table th, .token-table td {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.token-table th {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
}
.token-table code {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-2);
}
.swatch-dot {
  width: 18px;
  height: 18px;
  border-radius: var(--r-1);
  border: 1px solid rgba(0,0,0,0.06);
  display: inline-block;
  vertical-align: middle;
  margin-right: var(--sp-2);
}

</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
(() => {
// Storybook shell — sidebar nav + hash routing + theme toggle.
// Pages register themselves on window.P7L_DS_PAGES.

const { useState, useEffect, useMemo } = React;

const NAV = [
  { section: 'Foundations', items: [
    { id: 'intro',       title: 'Introduction' },
    { id: 'logo',        title: 'Logo system' },
    { id: 'color',       title: 'Color' },
    { id: 'type',        title: 'Type' },
    { id: 'spacing',     title: 'Spacing & radius' },
    { id: 'shadow',      title: 'Shadow & elevation' },
  ]},
  { section: 'Marks', items: [
    { id: 'icons',       title: 'Iconography' },
    { id: 'category-seals', title: 'Category seals' },
    { id: 'state-badges',title: 'State badges' },
  ]},
  { section: 'Illustration', items: [
    { id: 'illustration',title: 'Illustration directions' },
  ]},
  { section: 'Components', items: [
    { id: 'plant-card',  title: 'Plant card' },
    { id: 'plant-detail',title: 'Plant detail' },
  ]},
];

const FlatNav = NAV.flatMap(s => s.items);

function useHashRoute() {
  const [route, setRoute] = useState(() => (window.location.hash.replace('#/', '') || 'intro'));
  useEffect(() => {
    const onHash = () => setRoute(window.location.hash.replace('#/', '') || 'intro');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const go = (id) => { window.location.hash = '#/' + id; };
  return [route, go];
}

function useTheme() {
  const [theme, setTheme] = useState(() => {
    return localStorage.getItem('p7l-ds-theme') || 'light';
  });
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('p7l-ds-theme', theme);
  }, [theme]);
  return [theme, setTheme];
}

const Brandmark = () => (
  // Tiny apothecary stamp, used in the sidebar
  <svg viewBox="0 0 64 64" width="32" height="32" aria-hidden="true">
    <circle cx="32" cy="32" r="29" fill="none" stroke="currentColor" strokeWidth="1.5"/>
    <circle cx="32" cy="32" r="25" fill="none" stroke="currentColor" strokeWidth="0.75"/>
    <text x="32" y="38" textAnchor="middle" fontFamily='"Source Serif 4", Georgia, serif'
          fontWeight="600" fontSize="20" letterSpacing="-1" fill="currentColor">p7l</text>
  </svg>
);

const Sidebar = ({ route, go, theme, setTheme }) => (
  <aside className="sidebar">
    <div className="sidebar-brand">
      <span className="sidebar-brand-mark" style={{ color: 'var(--ink)' }}>
        <Brandmark />
      </span>
      <span className="sidebar-brand-text">
        <span className="sidebar-brand-name">p7l</span>
        <span className="sidebar-brand-sub">design system</span>
      </span>
    </div>
    <nav className="sidebar-nav">
      {NAV.map(sec => (
        <div key={sec.section}>
          <div className="sidebar-section">{sec.section}</div>
          {sec.items.map(item => (
            <a key={item.id}
               href={'#/' + item.id}
               className={'sidebar-link ' + (route === item.id ? 'active' : '')}
               onClick={(e) => { e.preventDefault(); go(item.id); }}>
              {item.title}
            </a>
          ))}
        </div>
      ))}
    </nav>
    <div className="sidebar-foot">
      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10,
                       letterSpacing: '0.08em', textTransform: 'uppercase',
                       color: 'var(--ink-3)' }}>v0.1</span>
      <button className="theme-toggle" onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')}>
        {theme === 'light' ? '☾ dark' : '☀ light'}
      </button>
    </div>
  </aside>
);

const PageHeader = ({ eyebrow, title, lede }) => (
  <header style={{ marginBottom: 'var(--sp-12)' }}>
    {eyebrow && <div className="page-eyebrow">{eyebrow}</div>}
    <h1 className="page-title">{title}</h1>
    {lede && <p className="page-lede">{lede}</p>}
  </header>
);

const Section = ({ title, sub, children }) => (
  <section className="section">
    {title && <h2 className="section-title">{title}</h2>}
    {sub && <p className="section-sub">{sub}</p>}
    {children}
  </section>
);

const Subhead = ({ children }) => <div className="subhead">{children}</div>;

const Specimen = ({ tag, children, style, padded = true }) => (
  <div className="specimen" style={{ padding: padded ? undefined : 0, ...style }}>
    {tag && <span className="specimen-tag">{tag}</span>}
    {children}
  </div>
);

window.P7L_DS_SHELL = { useHashRoute, useTheme, Sidebar, PageHeader, Section, Subhead, Specimen, FlatNav, Brandmark };

})();
</script>
<script type="text/babel" data-presets="react">
(() => {
// Foundations pages: intro, logo, color, type, spacing, shadow
// Logo1..Logo8 from logo-concepts.js are NOT loaded here — this is a fresh system.

const { Section, Subhead, Specimen, PageHeader } = window.P7L_DS_SHELL;

// === REFINED APOTHECARY STAMP ===
// This is the upgraded version of Logo7. Bigger ring, kerned wordmark,
// proper microtext, hairline inner ring, dignified leaf.
const ApothecaryStamp = ({ size = 220, color = 'currentColor', accent = 'var(--highlight)' }) => (
  <svg viewBox="0 0 240 240" width={size} height={size} aria-hidden="true">
    <defs>
      <path id="ap-circ-top" d="M 120,120 m -94,0 a 94,94 0 1,1 188,0"/>
      <path id="ap-circ-bot" d="M 120,120 m -94,0 a 94,94 0 1,0 188,0" transform="rotate(0 120 120)"/>
    </defs>
    {/* outer ring */}
    <circle cx="120" cy="120" r="110" fill="none" stroke={color} strokeWidth="1.75"/>
    {/* inner hairline */}
    <circle cx="120" cy="120" r="100" fill="none" stroke={color} strokeWidth="0.6"/>
    {/* microtext arc top */}
    <text fontFamily='"Source Serif 4", Georgia, serif' fontStyle="italic"
          fontSize="11" letterSpacing="3.5" fill={color}>
      <textPath href="#ap-circ-top" startOffset="50%" textAnchor="middle">
        plnt · trmnl · houseplant care
      </textPath>
    </text>
    {/* dot separators in the ring band */}
    <circle cx="20" cy="120" r="1.6" fill={color}/>
    <circle cx="220" cy="120" r="1.6" fill={color}/>
    {/* microtext arc bottom */}
    <text fontFamily='"Source Serif 4", Georgia, serif' fontStyle="italic"
          fontSize="11" letterSpacing="3.5" fill={color}>
      <textPath href="#ap-circ-bot" startOffset="50%" textAnchor="middle">
        · est · MMXXV ·
      </textPath>
    </text>

    {/* central wordmark */}
    <text x="120" y="138" textAnchor="middle"
          fontFamily='"Source Serif 4", Georgia, serif' fontWeight="600"
          fontSize="64" letterSpacing="-2" fill={color}>p7l</text>

    {/* decorative leaf above */}
    <g transform="translate(120 75)" fill={accent}>
      <path d="M0 0 C -10 -14, 8 -22, 14 -12 C 18 -4, 6 6, 0 0 Z"/>
      <path d="M0 0 L 10 -10" stroke={accent} strokeWidth="1.5" strokeLinecap="round" fill="none"/>
    </g>
    {/* tiny tick marks at the cardinal points */}
    {[[120,16],[120,224],[16,120],[224,120]].map(([cx,cy], i) => (
      <circle key={i} cx={cx} cy={cy} r="2" fill={color}/>
    ))}
  </svg>
);

// Wordmark — daily-driver mark
const Wordmark = ({ size = 48, color = 'currentColor' }) => (
  <span style={{ fontFamily: 'var(--font-serif)', fontSize: size, fontWeight: 600,
                   letterSpacing: '-0.04em', lineHeight: 1, color }}>p7l</span>
);

// Horizontal lockup — stamp + wordmark + descriptor

  <div style={{ display: 'flex', alignItems: 'center', gap: 18, color }}>

<script type="text/babel" data-presets="react">
(() => {
// p7l design system — entry. Wires sidebar + page routing.

const { useHashRoute, useTheme, Sidebar } = window.P7L_DS_SHELL;
const { IntroPage, LogoPage } = window.P7L_DS_FOUND_1;
const { ColorPage, TypePage, SpacingPage, ShadowPage } = window.P7L_DS_FOUND_2;
const { IconsPage, CategorySealsPage, StateBadgesPage, IllustrationPage } = window.P7L_DS_MARKS;
const { PlantCardPage, PlantDetailPage } = window.P7L_DS_COMPONENTS;

const PAGES = {
  intro:           IntroPage,
  logo:            LogoPage,
  color:           ColorPage,
  type:            TypePage,
  spacing:         SpacingPage,
  shadow:          ShadowPage,
  icons:           IconsPage,
  'category-seals':CategorySealsPage,
  'state-badges':  StateBadgesPage,
  illustration:    IllustrationPage,
  'plant-card':    PlantCardPage,
  'plant-detail':  PlantDetailPage,
};

const App = () => {
  const [route, go] = useHashRoute();
  const [theme, setTheme] = useTheme();
  const Page = PAGES[route] || IntroPage;
  return (
    <div className="app">
      <Sidebar route={route} go={go} theme={theme} setTheme={setTheme}/>
      <main className="main" key={route}>
        <Page/>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

})();
</script>
