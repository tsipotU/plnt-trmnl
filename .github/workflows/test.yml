name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API + renderer suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: vitest (API workspace)
        working-directory: packages/api
        run: npm test
      - name: vitest (renderer workspace)
        working-directory: packages/renderer
        run: npm test

  client:
    name: Client suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: packages/api/client/package-lock.json
      - name: install client deps
        working-directory: packages/api/client
        run: npm ci
      - name: vitest (client)
        working-directory: packages/api/client
        run: npm test
