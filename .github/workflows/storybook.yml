name: storybook

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time. New pushes cancel in-flight builds.
# github.ref is a git ref (refs/heads/main), not user input.
concurrency:
  group: storybook-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: packages/api/client/package-lock.json
      - name: Install client deps
        working-directory: packages/api/client
        run: npm ci
      - name: Build Storybook
        working-directory: packages/api/client
        run: npm run build-storybook -- --output-dir storybook-static
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/api/client/storybook-static

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
